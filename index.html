<!DOCTYPE html>
<!--
    V2 app shell.

    This file is the browser entry point for the GitHub Pages version of the
    quote tool. It loads the CDN libraries, keeps the small shared CSS rules,
    and then loads our local V2 scripts in the order they need to run.

    Most day-to-day app changes should happen in app.js, pricing.json, or one
    of the helper files. This file should stay boring on purpose.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCC Quote Tool</title>
    <script>
        tailwind = window.tailwind || {};
        tailwind.config = {
            theme: {
                screens: {
                    sm: '640px',
                    md: '768px',
                    lg: '1180px',
                    xl: '1280px',
                    '2xl': '1536px'
                }
            }
        };
    </script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- html2canvas and jsPDF for 1:1 Perfect PDF Capture -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- LZ-String for URL Compression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3ede0;
            color: #000000;
        }

        /* Remove number input spinners */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            appearance: textfield;
            -moz-appearance: textfield;
        }

        .verizon-red { color: #f50a23; }
        .bg-verizon-red { background-color: #f50a23; }
        
        .hardware-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Prevent scrolling from changing numbers */
        input[type=number] {
            touch-action: manipulation;
        }

        /*
            iPad Safari can report a desktop-ish viewport in portrait. Keep
            portrait tablets on the clean medium layout instead of the wide
            desktop row layout.
        */
        @media (orientation: portrait) and (pointer: coarse) and (min-width: 768px) and (max-width: 1366px) {
            .lg\:flex-row {
                flex-direction: column !important;
            }
            .lg\:w-48,
            .lg\:w-52,
            .lg\:w-36 {
                width: 100% !important;
            }
            .lg\:shrink-0 {
                flex-shrink: 1 !important;
            }
            .lg\:border-t-0 {
                border-top-width: 1px !important;
            }
            .lg\:border-l {
                border-left-width: 0 !important;
            }
            .lg\:pt-0 {
                padding-top: 1.25rem !important;
            }
            .lg\:pl-6 {
                padding-left: 0 !important;
            }
            .lg\:items-end {
                align-items: center !important;
            }
            .lg\:text-left {
                text-align: center !important;
            }
            .lg\:grid-cols-12 {
                grid-template-columns: repeat(1, minmax(0, 1fr)) !important;
            }
            .lg\:col-span-4,
            .lg\:col-span-8 {
                grid-column: auto !important;
            }
        }

    </style>
</head>
<body>
    <div id="root"></div>

    <script src="calculations.js?v=20260501-2"></script>
    <script src="state.js?v=20260501-1"></script>
    <script src="shareLinks.js?v=20260501-1"></script>
    <script src="pagination.js?v=20260501-1"></script>
    <script src="pdf.js?v=20260501-1"></script>
    <script type="text/babel" src="vmpCalculator.js?v=20260502-1"></script>
    <script type="text/babel" src="app.js?v=20260502-1"></script>
</body>
</html>
